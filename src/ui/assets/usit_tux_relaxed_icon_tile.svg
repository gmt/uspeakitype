<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Relaxed Tux at a dictation workstation</title>
  <desc id="desc">A KDE-style icon showing a penguin in an office chair with feet up on a desk, flippers behind his head, wearing a headset, with transcription software on one monitor and a candidate menu over a spreadsheet on the other.</desc>
  <defs>
    <linearGradient id="tileBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18120E"/>
      <stop offset="55%" stop-color="#100D0A"/>
      <stop offset="100%" stop-color="#0F0C0C"/>
    </linearGradient>
    <linearGradient id="deskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#221712"/>
      <stop offset="100%" stop-color="#120C09"/>
    </linearGradient>
    <linearGradient id="bezelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#241A15"/>
      <stop offset="100%" stop-color="#100B08"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#120D09"/>
      <stop offset="100%" stop-color="#060403"/>
    </linearGradient>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C1414"/>
      <stop offset="100%" stop-color="#2D211E"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8C553D"/>
      <stop offset="55%" stop-color="#D39A4C"/>
      <stop offset="100%" stop-color="#F2D77A"/>
    </linearGradient>
    <linearGradient id="chairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B3038"/>
      <stop offset="100%" stop-color="#181C22"/>
    </linearGradient>
    <linearGradient id="penguinBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E222A"/>
      <stop offset="100%" stop-color="#08090B"/>
    </linearGradient>
    <linearGradient id="penguinBelly" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F1E8"/>
      <stop offset="100%" stop-color="#D9D1C6"/>
    </linearGradient>
    <linearGradient id="headsetGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D6F8FF"/>
      <stop offset="100%" stop-color="#8EAAB2"/>
    </linearGradient>
    <linearGradient id="potGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4D392D"/>
      <stop offset="100%" stop-color="#2A1E18"/>
    </linearGradient>
    <linearGradient id="stoolGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A404A"/>
      <stop offset="100%" stop-color="#1B1E24"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.4" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <clipPath id="leftScreenClip">
      <rect x="0" y="0" width="76" height="54" rx="7"/>
    </clipPath>
    <clipPath id="rightScreenClip">
      <rect x="0" y="0" width="66" height="58" rx="8"/>
    </clipPath>
  </defs>

  <rect x="13" y="13" width="230" height="230" rx="40" fill="url(#tileBg)" stroke="#745844" stroke-width="2.3"/>
  <rect x="21" y="21" width="214" height="214" rx="33" fill="none" stroke="#2D231C" stroke-width="1.3" opacity="0.9"/>
  <path d="M28 42 C55 22, 122 18, 223 28" fill="none" stroke="#4D392D" stroke-width="1.4" opacity="0.55"/>
  <ellipse cx="128" cy="210" rx="86" ry="19" fill="#000000" opacity="0.18"/>

  <!-- leveled desk -->
  <g filter="url(#shadow)">
    <path d="M54 114 L222 114 L208 162 L41 162 Z" fill="url(#deskGrad)" stroke="#745844" stroke-width="2.2" stroke-linejoin="round"/>
    <path d="M41 162 L208 162 L206 170 L39 170 Z" fill="#0B0806" opacity="0.95"/>
    <path d="M59 120 L217 120" stroke="#2D231C" stroke-width="1.4" opacity="0.65"/>
    <path d="M54 114 L222 114" stroke="#DCC3A4" stroke-width="0.6" opacity="0.2"/>
  </g>

  <!-- plant -->
  <g transform="translate(24 150)" filter="url(#soft)">
    <ellipse cx="20" cy="44" rx="20" ry="6" fill="#000" opacity="0.22"/>
    <path d="M8 33 L32 33 L28 49 L12 49 Z" fill="url(#potGrad)" stroke="#745844" stroke-width="1.4"/>
    <path d="M20 34 C20 21 20 12 20 0" stroke="#4D6B5A" stroke-width="3" stroke-linecap="round"/>
    <path d="M20 20 C6 10 5 0 12 -12" stroke="#5B806A" stroke-width="4.8" stroke-linecap="round" fill="none"/>
    <path d="M20 16 C30 5 36 -5 34 -18" stroke="#5B806A" stroke-width="4.2" stroke-linecap="round" fill="none"/>
    <path d="M20 24 C10 17 0 16 -8 22" stroke="#4F6F5E" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    <path d="M20 25 C30 18 41 18 48 25" stroke="#4F6F5E" stroke-width="3.8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- monitors -->
  <g transform="translate(68 50)" filter="url(#shadow)">
    <rect x="0" y="0" width="82" height="60" rx="10" fill="url(#bezelGrad)" stroke="#745844" stroke-width="1.8"/>
    <rect x="6" y="6" width="70" height="48" rx="7" fill="url(#screenGrad)"/>
    <g clip-path="url(#leftScreenClip)" transform="translate(6 6)">

      <!-- Spreadsheet background -->
      <rect x="0" y="0" width="70" height="48" fill="#1C1414"/>
      <!-- Cell background -->
      <rect x="8" y="6" width="62" height="42" fill="#0C0907"/>

      <!-- Grid lines -->
      <g stroke="#2D231C" stroke-width="0.5">
        <!-- Horizontal -->
        <path d="M0 6 H70"/><path d="M0 13 H70"/><path d="M0 20 H70"/><path d="M0 27 H70"/><path d="M0 34 H70"/><path d="M0 41 H70"/>
        <!-- Vertical -->
        <path d="M8 0 V48"/><path d="M22 0 V48"/><path d="M36 0 V48"/><path d="M50 0 V48"/><path d="M64 0 V48"/>
      </g>
      
      <!-- Row numbers (mock) -->
      <rect x="2" y="8" width="4" height="3" fill="#3A2B23" rx="0.5"/>
      <rect x="2" y="15" width="4" height="3" fill="#3A2B23" rx="0.5"/>
      <rect x="2" y="22" width="4" height="3" fill="#3A2B23" rx="0.5"/>
      <rect x="2" y="29" width="4" height="3" fill="#3A2B23" rx="0.5"/>
      <rect x="2" y="36" width="4" height="3" fill="#3A2B23" rx="0.5"/>
      
      <!-- Column letters (mock) -->
      <rect x="13" y="2" width="4" height="2" fill="#3A2B23" rx="0.5"/>
      <rect x="27" y="2" width="4" height="2" fill="#3A2B23" rx="0.5"/>
      <rect x="41" y="2" width="4" height="2" fill="#3A2B23" rx="0.5"/>
      <rect x="55" y="2" width="4" height="2" fill="#3A2B23" rx="0.5"/>

      <!-- Data blocks inside cells -->
      <!-- Row 1 -->
      <rect x="10" y="8" width="10" height="3" fill="#A89B8E" rx="0.5"/>
      <rect x="24" y="8" width="8" height="3" fill="#A89B8E" rx="0.5"/>
      <rect x="38" y="8" width="9" height="3" fill="#D39A4C" rx="0.5"/>
      <!-- Row 2 -->
      <rect x="10" y="15" width="7" height="3" fill="#A89B8E" rx="0.5"/>
      
      <!-- Active cell (Row 2, Col 2) -->
      <rect x="22.5" y="13.5" width="13" height="6" fill="#122B28" stroke="#53E2CD" stroke-width="0.8"/>
      <!-- Cursor / selection start -->
      <rect x="24" y="15" width="10" height="3" fill="#53E2CD" opacity="0.3" rx="0.5"/> 
      <!-- Text being typed -->
      <rect x="24" y="15" width="6" height="3" fill="#FFFFFF" rx="0.5"/>
      
      <!-- Row 3 -->
      <rect x="10" y="22" width="11" height="3" fill="#A89B8E" rx="0.5"/>
      <rect x="24" y="22" width="6" height="3" fill="#A89B8E" rx="0.5"/>
      <rect x="38" y="22" width="10" height="3" fill="#D39A4C" rx="0.5"/>
      
      <!-- Row 4 -->
      <rect x="10" y="29" width="9" height="3" fill="#A89B8E" rx="0.5"/>
      <rect x="24" y="29" width="9" height="3" fill="#A89B8E" rx="0.5"/>
      
      <!-- Dictation popover/tooltip overlay floating next to active cell -->
      <g transform="translate(18 21)" filter="url(#shadow)">
        <rect x="0" y="0" width="34" height="18" rx="2" fill="#181C22" stroke="#4D392D" stroke-width="0.8"/>
        <!-- Mic icon in tooltip -->
        <circle cx="6" cy="6" r="2.5" fill="#181C22" stroke="#53E2CD" stroke-width="0.8"/>
        <path d="M6 3.5 V5.5" stroke="#53E2CD" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M4 6.5 C4 7.5 5 8.5 6 8.5 C7 8.5 8 7.5 8 6.5" stroke="#53E2CD" stroke-width="0.8" fill="none"/>
        <path d="M6 8.5 V10" stroke="#53E2CD" stroke-width="0.8"/>
        
        <!-- Dropdown candidate list text -->
        <rect x="10" y="2.5" width="22" height="4" fill="#53E2CD" opacity="0.2" rx="1"/> <!-- Selection highlight in dropdown -->
        <rect x="11" y="3" width="18" height="3" fill="#FFFFFF" rx="1"/> <!-- committed/top choice -->
        <rect x="11" y="8" width="14" height="2" fill="#A89B8E" rx="1"/> <!-- alternative 1 -->
        <rect x="11" y="12" width="16" height="2" fill="#A89B8E" rx="1"/> <!-- alternative 2 -->
      </g>
    </g>
    <rect x="36" y="60" width="10" height="14" rx="3" fill="#2D231C"/>
    <rect x="24" y="72" width="34" height="6" rx="3" fill="#201813"/>
  </g>

  <g transform="translate(154 48)" filter="url(#shadow)">
    <rect x="0" y="0" width="72" height="64" rx="11" fill="url(#bezelGrad)" stroke="#745844" stroke-width="1.8"/>
    <rect x="6" y="6" width="60" height="52" rx="8" fill="url(#screenGrad)"/>
    <g clip-path="url(#rightScreenClip)" transform="translate(6 6)">
      <rect x="0" y="0" width="60" height="52" fill="#090604"/>
      <rect x="4" y="4" width="52" height="44" rx="12" fill="url(#pillGrad)" stroke="#4D392D" stroke-width="0.8"/>
      <rect x="8" y="8" width="20" height="7" rx="3.5" fill="#2C4937"/>
      <circle cx="24" cy="11.5" r="2.8" fill="#9EB26B"/>
      <rect x="33" y="8" width="19" height="7" rx="3.5" fill="#3B2A28"/>
      <circle cx="48" cy="11.5" r="2.8" fill="#C8B08D"/>
      <g transform="translate(8 18)">
        <rect x="0" y="0" width="44" height="16" rx="2" fill="#120D09" stroke="#2D231C" stroke-width="0.6"/>
        <g>
          <rect x="1" y="10" width="2" height="5" rx="1" fill="url(#barGrad)"/>
          <rect x="5" y="9" width="2" height="6" rx="1" fill="url(#barGrad)"/>
          <rect x="9" y="8" width="2" height="7" rx="1" fill="url(#barGrad)"/>
          <rect x="13" y="5" width="2" height="10" rx="1" fill="url(#barGrad)"/>
          <rect x="17" y="4" width="2" height="11" rx="1" fill="url(#barGrad)"/>
          <rect x="21" y="6" width="2" height="9" rx="1" fill="url(#barGrad)"/>
          <rect x="25" y="8" width="2" height="7" rx="1" fill="url(#barGrad)"/>
          <rect x="29" y="9" width="2" height="6" rx="1" fill="url(#barGrad)"/>
          <rect x="33" y="7" width="2" height="8" rx="1" fill="url(#barGrad)"/>
          <rect x="37" y="5" width="2" height="10" rx="1" fill="url(#barGrad)"/>
          <rect x="41" y="8" width="2" height="7" rx="1" fill="url(#barGrad)"/>
        </g>
      </g>
      <rect x="8" y="37" width="39" height="3.8" rx="1.9" fill="#F4EFE5" opacity="0.9"/>
      <rect x="8" y="43" width="31" height="3.8" rx="1.9" fill="#A89B8E" opacity="0.85"/>
    </g>
    <rect x="31" y="64" width="10" height="16" rx="3" fill="#2D231C"/>
    <rect x="18" y="78" width="36" height="6" rx="3" fill="#201813"/>
  </g>

  <!-- chair -->
  <g transform="translate(60 142) rotate(-5)" filter="url(#soft)">
    <ellipse cx="32" cy="58" rx="27" ry="8" fill="#000" opacity="0.18"/>
    <rect x="17" y="0" width="34" height="50" rx="15" fill="url(#chairGrad)" stroke="#4D392D" stroke-width="1.3"/>
    <rect x="10" y="36" width="44" height="16" rx="8" fill="url(#chairGrad)" stroke="#4D392D" stroke-width="1.1"/>
    <rect x="30" y="50" width="8" height="22" rx="4" fill="#2A3037"/>
    <path d="M34 70 L18 84 M34 70 L51 84 M34 70 L34 87" stroke="#2A3037" stroke-width="4.5" stroke-linecap="round"/>
    <circle cx="18" cy="84" r="3.5" fill="#1B1E24"/><circle cx="51" cy="84" r="3.5" fill="#1B1E24"/><circle cx="34" cy="87" r="3.5" fill="#1B1E24"/>
  </g>

  <!-- footstool -->
  <g transform="translate(125 168)" filter="url(#shadow)">
    <rect x="0" y="0" width="46" height="8" rx="3" fill="url(#stoolGrad)"/>
    <path d="M8 8 L4 28 M38 8 L42 28" stroke="#1B1E24" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="23" cy="4" rx="14" ry="4" fill="#000" opacity="0.3"/>
  </g>

  <!-- penguin -->
  <g transform="translate(100 135) rotate(-5)" filter="url(#shadow)">
    <!-- legs to stool -->
    <path d="M18 22 C25 28 35 30 45 35" stroke="#121419" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M12 28 C20 35 28 38 35 42" stroke="#181C22" stroke-width="9" stroke-linecap="round" fill="none"/>

    <!-- flippers behind head -->
    <path d="M-17 -18 C-36 -30 -37 -47 -28 -56 C-16 -49 -8 -35 -5 -22 Z" fill="#121419" stroke="#3A404A" stroke-width="1.5"/>
    <path d="M5 -17 C20 -31 29 -44 38 -44 C39 -31 33 -21 17 -8 Z" fill="#121419" stroke="#3A404A" stroke-width="1.5"/>

    <!-- body and head -->
    <ellipse cx="0" cy="12" rx="31" ry="37" fill="url(#penguinBody)"/>
    <ellipse cx="10" cy="6" rx="16" ry="22" fill="url(#penguinBelly)" opacity="0.96"/>
    <circle cx="-2" cy="-31" r="22" fill="url(#penguinBody)"/>
    <path d="M5 -43 C15 -41 21 -32 19 -21 C9 -20 2 -25 0 -35 Z" fill="#F1ECE4"/>
    <path d="M16 -34 L30 -31 L17 -24 Z" fill="#D39A4C" stroke="#8C553D" stroke-width="1"/>

    <!-- headset -->
    <path d="M-20 -28 C-25 -45 -15 -58 0 -58 C15 -58 25 -45 20 -28" stroke="url(#headsetGrad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="-18" cy="-28" rx="4" ry="9" fill="#1A1F26" stroke="url(#headsetGrad)" stroke-width="1.5"/>
    <ellipse cx="18" cy="-28" rx="4" ry="9" fill="#1A1F26" stroke="url(#headsetGrad)" stroke-width="1.5"/>
    <path d="M18 -26 C25 -22 32 -18 35 -14" stroke="url(#headsetGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="35" cy="-14" r="3" fill="#53E2CD"/>

    <!-- feet on stool -->
    <g transform="translate(48 33)">
      <ellipse cx="0" cy="0" rx="13" ry="8.5" fill="#D39A4C" stroke="#8C553D" stroke-width="1.1"/>
      <path d="M-8 2 L-8 6 M0 2 L0 7 M8 2 L8 6" stroke="#8C553D" stroke-width="1.1" stroke-linecap="round"/>
    </g>
    <g transform="translate(38 41)">
      <ellipse cx="0" cy="0" rx="12" ry="8" fill="#D39A4C" stroke="#8C553D" stroke-width="1.1"/>
      <path d="M-7 1.8 L-7 5.8 M0 2 L0 6.5 M7 1.8 L7 5.8" stroke="#8C553D" stroke-width="1.1" stroke-linecap="round"/>
    </g>
  </g>

  <!-- subtle warm highlights -->
  <path d="M54 114 L222 114" stroke="#D6A356" stroke-width="0.8" opacity="0.28"/>
  <circle cx="93" cy="58" r="22" fill="#D6A356" opacity="0.03"/>
</svg>
